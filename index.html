<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Escaneig NEXA (mòbil)</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, Arial, sans-serif; background: #f0f2f5; color: #1a2a3a; }
  header { background: #1a3a5c; color: #fff; padding: 14px 16px; font-size: 16px; font-weight: 700; }
  .wrap { padding: 14px; max-width: 480px; margin: 0 auto; }
  .card { background: #fff; border: 1px solid #e4e8ee; border-radius: 12px; padding: 14px; margin-bottom: 14px; }
  .card h4 { margin: 0 0 10px; font-size: 11px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 0.05em; }
  #box { width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 8px; overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; }
  #box video, #box canvas { width: 100% !important; height: 100% !important; object-fit: cover; }
  .off { color: #999; font-size: 12px; text-align: center; padding: 12px; }
  .btns { display: flex; gap: 8px; margin-top: 10px; }
  button { flex: 1; font-size: 14px; font-weight: 600; padding: 11px; border: 1px solid #e4e8ee; border-radius: 8px; background: #fff; color: #555; font-family: inherit; }
  button.primary { background: #1a3a5c; color: #fff; border-color: #1a3a5c; }
  button.danger { color: #cc4444; border-color: #f0c0c0; }
  button:disabled { opacity: 0.5; }
  .modes { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px; }
  .modes button { font-size: 12px; padding: 10px 6px; }
  .modes button.on { background: #1a3a5c; color: #fff; border-color: #1a3a5c; }
  .overlay-stock { position: fixed; inset: 0; background: rgba(10,20,40,0.55); z-index: 999; display: none; align-items: center; justify-content: center; padding: 20px; }
  .overlay-stock.show { display: flex; }
  .stock-modal { background: #fff; border-radius: 14px; padding: 18px; width: 100%; max-width: 340px; }
  .stock-modal h4 { margin: 0 0 10px; font-size: 14px; color: #1a2a3a; }
  .stock-modal .ref-linia { font-size: 14px; }
  #stock-quant { width: 100%; font-size: 22px; text-align: center; padding: 10px; margin-top: 6px; border: 1px solid #e4e8ee; border-radius: 8px; font-family: inherit; }
  .stock-label { font-size: 11px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 12px; display: block; }
  .stock-box { text-align: center; padding: 10px; border-radius: 8px; margin-top: 8px; font-size: 13px; }
  .stock-box.info { background: #eef4ff; color: #1a3a5c; }
  .stock-box.warn { background: #fff5e6; color: #995500; }
  input[type=text] { width: 100%; font-size: 14px; padding: 10px; border: 1px solid #e4e8ee; border-radius: 8px; font-family: inherit; }
  .manual { display: flex; gap: 6px; margin-top: 8px; }
  .manual input { flex: 1; }
  .manual button { flex: 0 0 auto; padding: 10px 16px; }
  .llista { margin-top: 6px; max-height: 260px; overflow-y: auto; }
  .fila { display: flex; justify-content: space-between; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #f0f2f5; font-size: 13px; }
  .fila .info { flex: 1; min-width: 0; }
  .fila .ref { font-family: monospace; font-weight: 700; color: #2a5aaa; }
  .fila .ok { color: #2a8a4a; font-size: 12px; }
  .fila .err { color: #cc4444; font-size: 12px; }
  .fila .del { flex: 0 0 auto; width: 26px; height: 26px; border: 1px solid #f0c0c0; background: #fff; color: #cc4444; border-radius: 6px; font-size: 14px; font-weight: 700; padding: 0; line-height: 1; }
  .buit { text-align: center; color: #bbb; padding: 20px; font-size: 13px; }
  .toast { position: fixed; left: 50%; bottom: 20px; transform: translate(-50%, 20px); background: #1a3a5c; color: #fff; padding: 10px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; opacity: 0; transition: 0.2s; pointer-events: none; }
  .toast.show { opacity: 1; transform: translate(-50%, 0); }
</style>
</head>
<body>
<header>Escaneig NEXA — mòbil</header>
<div class="wrap">

  <div class="card">
    <h4>El teu nom (queda desat en aquest mòbil)</h4>
    <input type="text" id="usuari" placeholder="Ex: Victor" oninput="desarUsuari()">
  </div>

  <div class="card">
    <h4>Què vols fer en escanejar?</h4>
    <div class="modes">
      <button type="button" id="mode-afegir"      onclick="triarMode('afegir')">📦 Demanar</button>
      <button type="button" id="mode-consultar"   onclick="triarMode('consultar')">🔍 Consultar stock</button>
      <button type="button" id="mode-retirar"     onclick="triarMode('retirar')">📤 Retirar peça</button>
      <button type="button" id="mode-afegirStock" onclick="triarMode('afegirStock')">➕ Afegir stock</button>
    </div>
  </div>

  <div class="card">
    <h4>Escàner</h4>
    <div id="box"><div class="off">Pulsa "Iniciar càmera"</div></div>
    <div class="btns">
      <button class="primary" id="btn-start" onclick="iniciar()">Iniciar càmera</button>
      <button class="danger" id="btn-stop" onclick="aturar()" disabled>Aturar</button>
    </div>
    <div style="font-size:11px;color:#999;margin-top:10px">O introdueix la referència a mà:</div>
    <form class="manual" onsubmit="event.preventDefault();afegirManual();">
      <input type="text" id="manual" placeholder="Ref. o QR..." autocomplete="off">
      <button type="submit" class="primary">+ Afegir</button>
    </form>
  </div>

  <div class="card">
    <h4>Escanejats en aquesta sessió</h4>
    <div class="llista" id="llista"><div class="buit">Encara no has escanejat res.</div></div>
  </div>

</div>

<div class="overlay-stock" id="stock-overlay">
  <div class="stock-modal">
    <h4 id="stock-titol">Quantitat</h4>
    <div class="ref-linia"><span class="ref" id="stock-ref" style="font-family:monospace;font-weight:700;color:#2a5aaa"></span> <span id="stock-desc"></span></div>
    <label class="stock-label">Quantitat</label>
    <input type="number" id="stock-quant" value="1" min="1" step="1">
    <div id="stock-disponible" style="font-size:12px;color:#999;margin-top:6px;display:none"></div>
    <div class="btns">
      <button class="danger" onclick="cancelarQuantitat()">Cancel·lar</button>
      <button class="primary" onclick="confirmarQuantitat()">Confirmar</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
  // ── Configura aquí la URL de l'exec/dev del ERP NEXA ──
  var API_URL = 'https://script.google.com/macros/s/AKfycbz08C6cBVv_1Fil9vzGdY0OKnGwplDCEFqyH5A6Huvv/dev';

  var scanner = null;
  var sessio = {};       // clau = ref en majúscules -> { ref, desc, ok, missatge, comptador, ordre }
  var pendents = {};     // clau = ref en majúscules -> true mentre s'espera resposta del servidor (o confirmació de quantitat)
  var recents = {};      // clau = ref en majúscules -> timestamp de l'últim cop confirmat
  var ordreSeq = 0;
  var jsonpSeq = 0;
  var COOLDOWN_MS = 3000; // temps mínim entre dos escanejos del mateix codi
  var stockPendent = null; // { key, ref, desc } mentre s'espera que l'usuari confirmi la quantitat a afegir

  function gid(id){ return document.getElementById(id); }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
  function toast(msg){ var t=gid('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},1400); }
  function beep(){
    try {
      var a = new (window.AudioContext||window.webkitAudioContext)();
      var o = a.createOscillator(); var g = a.createGain();
      o.connect(g); g.connect(a.destination);
      o.type = 'square'; o.frequency.value = 1000;
      var ara = a.currentTime, dur = 0.22;
      g.gain.setValueAtTime(0.6, ara);
      g.gain.exponentialRampToValueAtTime(0.001, ara + dur); // fade-out per evitar "clic" sec
      o.start(ara); o.stop(ara + dur);
      setTimeout(function(){ a.close(); }, (dur*1000) + 50);
    } catch(e){}
  }

  function desarUsuari(){ localStorage.setItem('esc_usuari', gid('usuari').value); }
  (function(){ gid('usuari').value = localStorage.getItem('esc_usuari') || ''; })();

  function parsear(txt){
    try { var o = JSON.parse(txt); if (o && o.r) return { ref: String(o.r), desc: String(o.d||'') }; } catch(e){}
    return { ref: String(txt||'').trim(), desc: '' };
  }

  var mode = 'afegir';

  window.triarMode = function(m){
    mode = m;
    ['afegir','consultar','retirar','afegirStock'].forEach(function(k){ gid('mode-'+k).classList.toggle('on', k===m); });
  };
  triarMode('afegir');

  function renderLlista(){
    var wrap = gid('llista');
    var items = Object.keys(sessio).map(function(k){ return sessio[k]; }).sort(function(a,b){ return b.ordre - a.ordre; });
    if (!items.length){ wrap.innerHTML = '<div class="buit">Encara no has escanejat res.</div>'; return; }
    wrap.innerHTML = items.map(function(it){
      var estat;
      if (it.ok === null) estat = '<span>...</span>';
      else if (!it.ok) estat = '<span class="err">✗ '+esc(it.missatge||'error')+'</span>';
      else {
        // Per "demanar" cada escaneig val 1 unitat, així que ×N mostra quants cops s'ha demanat.
        // Retirar/afegir stock ja inclouen la quantitat de l'última acció al mateix missatge.
        var n = it.mode === 'afegir' ? it.comptadorAfegir : 0;
        estat = '<span class="ok">'+esc(it.missatge)+(n>1?' ×'+n:'')+'</span>';
      }
      var potEliminar = it.ok === true && (it.comptadorAfegir > 0 || it.comptadorRetirar > 0 || it.totalAfegitStock > 0);
      return '<div class="fila">'
        + '<span class="info"><span class="ref">'+esc(it.ref)+'</span> '+(it.desc?('— '+esc(it.desc)):'')+'<br>'+estat+'</span>'
        + (potEliminar ? '<button type="button" class="del" onclick="eliminarFila(\''+esc(it.key)+'\')" title="Eliminar aquest escaneig">×</button>' : '')
        + '</div>';
    }).join('');
  }

  // Crida JSONP a l'API del ERP (evita problemes de CORS)
  function jsonp(params, cb){
    var name = 'jsonp_cb_' + (jsonpSeq++);
    params.callback = name;
    var qs = Object.keys(params).map(function(k){ return encodeURIComponent(k)+'='+encodeURIComponent(params[k]); }).join('&');
    var script = document.createElement('script');
    var neteja = function(){ delete window[name]; script.remove(); };
    window[name] = function(res){ neteja(); cb(null, res); };
    script.onerror = function(){ neteja(); cb(new Error('No s\'ha pogut contactar amb el ERP')); };
    script.src = API_URL + '?api=escaneig&' + qs;
    document.body.appendChild(script);
  }

  function processar(ref, desc){
    ref = String(ref||'').trim(); if (!ref) return;
    var key = ref.toUpperCase();
    var ara = Date.now();
    if (pendents[key]) return; // ja hi ha una petició en curs per aquesta ref, ignorar
    if (recents[key] && ara - recents[key] < COOLDOWN_MS){ toast(ref + ' — ja escanejat, espera un moment'); return; }
    pendents[key] = true;
    beep(); // confirmació immediata de lectura, abans de saber com acaba l'operació

    if (mode === 'afegirStock' || mode === 'retirar') {
      stockPendent = { key: key, ref: ref, desc: desc || '', accio: mode, maxStock: null };
      gid('stock-titol').textContent = mode === 'retirar' ? 'Quantitat a retirar' : 'Quantitat a afegir al stock';
      gid('stock-ref').textContent = ref;
      gid('stock-desc').textContent = desc ? ('— ' + desc) : '';
      gid('stock-quant').value = 1;
      gid('stock-quant').removeAttribute('max');
      gid('stock-overlay').classList.add('show');
      setTimeout(function(){ var inp = gid('stock-quant'); inp.focus(); inp.select(); }, 50);

      var dispEl = gid('stock-disponible');
      if (mode === 'retirar') {
        dispEl.style.display = 'block'; dispEl.textContent = 'Consultant stock disponible...';
        var stockPendentActual = stockPendent;
        jsonp({ accio: 'consultar', ref: ref }, function(err, res){
          if (stockPendent !== stockPendentActual) return; // s'ha cancel·lat o ja s'ha confirmat
          if (!err && res && res.ok && res.trobat) {
            stockPendent.maxStock = res.stock;
            dispEl.textContent = 'Stock disponible: ' + res.stock;
            gid('stock-quant').setAttribute('max', res.stock);
          } else {
            dispEl.textContent = 'No s\'ha pogut consultar el stock disponible';
          }
        });
      } else {
        dispEl.style.display = 'none';
      }
      return; // pendents[key] es queda a true fins que es confirmi o cancel·li
    }

    var usuari = gid('usuari').value.trim();
    var entrada = sessio[key];
    if (!entrada){ entrada = { key: key, ref: ref, desc: desc||'', ok: null, comptadorAfegir: 0, comptadorRetirar: 0, totalAfegitStock: 0, ordre: ordreSeq++, mode: mode }; sessio[key] = entrada; }
    else { entrada.ordre = ordreSeq++; entrada.ok = null; entrada.mode = mode; }
    renderLlista();

    function acabat(){ delete pendents[key]; recents[key] = Date.now(); renderLlista(); }

    if (mode === 'afegir') {
      jsonp({ accio: 'afegir', ref: ref, quant: 1, usuari: usuari }, function(err, res){
        entrada.ok = !!(!err && res && res.ok);
        if (entrada.ok){ entrada.comptadorAfegir++; entrada.missatge = '✓ demanat'; toast(ref + ' demanat ✓'); }
        else { entrada.missatge = (err ? err.message : (res && res.error)) || 'desconegut'; toast('Error: ' + entrada.missatge); }
        acabat();
      });
    } else if (mode === 'consultar') {
      jsonp({ accio: 'consultar', ref: ref }, function(err, res){
        entrada.ok = !!(!err && res && res.ok && res.trobat);
        if (entrada.ok){ entrada.desc = res.desc; entrada.missatge = 'Stock: ' + res.stock; toast(ref + ' → stock ' + res.stock); }
        else { entrada.missatge = err ? err.message : (res && res.ok ? 'No trobat a l\'inventari' : (res && res.error)) || 'desconegut'; toast('Error: ' + entrada.missatge); }
        acabat();
      });
    }
  }

  // Confirmació de quantitat dels modes "Afegir stock" i "Retirar peça" (oberts des de processar())
  window.confirmarQuantitat = function(){
    if (!stockPendent) return;
    var quant = parseFloat(gid('stock-quant').value);
    if (isNaN(quant) || quant <= 0){ toast('Posa una quantitat vàlida (més gran que 0)'); return; }
    if (stockPendent.accio === 'retirar' && stockPendent.maxStock != null && quant > stockPendent.maxStock){
      toast('Només hi ha ' + stockPendent.maxStock + ' unitats en stock'); return;
    }
    var key = stockPendent.key, ref = stockPendent.ref, desc = stockPendent.desc, accio = stockPendent.accio;
    gid('stock-overlay').classList.remove('show');
    stockPendent = null;

    var entrada = sessio[key];
    if (!entrada){ entrada = { key: key, ref: ref, desc: desc, ok: null, comptadorAfegir: 0, comptadorRetirar: 0, totalAfegitStock: 0, ordre: ordreSeq++, mode: accio }; sessio[key] = entrada; }
    else { entrada.ordre = ordreSeq++; entrada.ok = null; entrada.mode = accio; }
    renderLlista();

    jsonp({ accio: accio, ref: ref, quant: quant }, function(err, res){
      entrada.ok = !!(!err && res && res.ok);
      if (entrada.ok){
        entrada.desc = res.desc || entrada.desc;
        if (accio === 'retirar'){
          entrada.comptadorRetirar = (entrada.comptadorRetirar || 0) + quant;
          entrada.missatge = '✓ retirat ×' + quant + ' (stock ' + res.stockNou + ')';
          toast(ref + ' -' + quant + ' → stock ' + res.stockNou);
        } else {
          entrada.totalAfegitStock = (entrada.totalAfegitStock || 0) + quant;
          entrada.missatge = '✓ +' + quant + ' stock (ara ' + res.stockNou + ')';
          toast(ref + ' +' + quant + ' → stock ' + res.stockNou);
        }
      } else {
        entrada.missatge = (err ? err.message : (res && res.error)) || 'desconegut';
        toast('Error: ' + entrada.missatge);
      }
      delete pendents[key]; recents[key] = Date.now(); renderLlista();
    });
  };

  window.cancelarQuantitat = function(){
    if (stockPendent) delete pendents[stockPendent.key];
    gid('stock-overlay').classList.remove('show');
    stockPendent = null;
  };

  // Elimina un escaneig fet per error. Desfà cada efecte que realment s'hagi
  // produït en aquesta referència (pot haver-se demanat, retirat i/o afegit
  // stock alhora): treu de la comanda pendent si es va demanar, i torna a
  // sumar/restar exactament les unitats retirades o afegides.
  // Consultar stock no fa res al servidor.
  window.eliminarFila = function(key){
    var entrada = sessio[key]; if (!entrada || pendents[key]) return;
    pendents[key] = true;
    var tasques = [];
    if (entrada.comptadorAfegir > 0) tasques.push({ accio: 'eliminar', ref: entrada.ref });
    if (entrada.comptadorRetirar > 0) tasques.push({ accio: 'desferRetirar', ref: entrada.ref, quant: entrada.comptadorRetirar });
    if (entrada.totalAfegitStock > 0) tasques.push({ accio: 'retirar', ref: entrada.ref, quant: entrada.totalAfegitStock });

    function seguent(){
      if (!tasques.length){ delete pendents[key]; delete sessio[key]; toast(entrada.ref + ' eliminat'); renderLlista(); return; }
      jsonp(tasques.shift(), function(){ seguent(); });
    }
    seguent();
  };

  window.afegirManual = function(){
    var inp = gid('manual');
    var v = inp.value.trim(); if (!v) return;
    var d = parsear(v);
    processar(d.ref, d.desc);
    inp.value=''; inp.focus();
  };

  window.iniciar = function(){
    if (scanner) return;
    if (!window.Html5Qrcode){ toast('Llibreria no carregada'); return; }
    if (!gid('usuari').value.trim()){ toast('Posa el teu nom abans de començar'); return; }
    gid('box').innerHTML = '';
    scanner = new Html5Qrcode('box');
    scanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 240, height: 240 } },
      function(text){
        var d = parsear(text);
        processar(d.ref, d.desc);
      },
      function(){ /* errors de lectura, ignorar */ }
    ).then(function(){
      gid('btn-start').disabled = true; gid('btn-stop').disabled = false;
    }).catch(function(err){
      toast('No es pot accedir a la càmera'); scanner = null;
      gid('box').innerHTML = '<div class="off">Error: ' + esc(String(err||'')) + '</div>';
    });
  };

  window.aturar = function(){
    if (!scanner) return;
    scanner.stop().then(function(){
      try { scanner.clear(); } catch(e){}
      scanner = null;
      gid('box').innerHTML = '<div class="off">Càmera aturada</div>';
      gid('btn-start').disabled = false; gid('btn-stop').disabled = true;
    }).catch(function(){});
  };
</script>
</body>
</html>
